name: Validate OKF bundle

on:
  pull_request:
    paths:
      - "topics/**"
      - "scripts/validate_okf.py"
      - ".github/workflows/validate-okf.yml"
  push:
    branches: [main]
    paths:
      - "topics/**"
      - "scripts/validate_okf.py"
      - ".github/workflows/validate-okf.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install PyYAML==6.0.2
      - run: python scripts/validate_okf.py
